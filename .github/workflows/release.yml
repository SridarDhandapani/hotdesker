name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST=$(jq -r .version manifest.json)
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag v$TAG does not match manifest version $MANIFEST" >&2
            exit 1
          fi

      - name: Syntax-check JS
        run: |
          # Popup uses ESM; check it as a module so top-level returns are caught.
          cp popup/popup.js /tmp/popup-check.mjs
          node --check /tmp/popup-check.mjs
          for f in content/locations.js content/bookings.js content/content.js background/background.js; do
            node --check "$f"
          done

      - name: Build zip
        run: |
          # Build a clean zip excluding dev artefacts. The Webstore upload
          # should not include README, LICENSE, .github, .gitignore, or
          # the listing copy.
          mkdir -p dist
          zip -r "dist/hotdesker-${GITHUB_REF#refs/tags/}.zip" . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.gitignore' \
            -x 'README.md' \
            -x 'LICENSE' \
            -x 'CHANGELOG.md' \
            -x 'CLAUDE.md' \
            -x 'WEBSTORE_LISTING.md' \
            -x 'SCREENSHOTS.md' \
            -x 'docs/*' \
            -x 'dist/*' \
            -x '*.DS_Store'

      - name: Attach zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.zip
          generate_release_notes: true
